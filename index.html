<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Bud | Track smarter</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="landing-body">
  <main class="landing-container">
    <div class="floating-shapes" aria-hidden="true">
      <span class="shape shape-1"></span>
      <span class="shape shape-2"></span>
      <span class="shape shape-3"></span>
    </div>

    <section class="hero-card">
      <div class="logo-wrapper fade-scale-in">
        <div class="logo-icon" aria-hidden="true">
          <span class="coin">₹</span>
          <span class="graph-line"></span>
        </div>
        <p class="brand-text">Finance Bud</p>
      </div>

      <div class="hero-content slide-up">
        <h1>Finance Bud</h1>
        <p class="tagline">Track smarter. Spend better. Grow your money.</p>
      </div>

      <div class="hero-actions">
        <a href="dashboard.html" class="btn btn-primary fade-in-seq seq-1">Get Started</a>
        <a href="dashboard.html" class="btn btn-secondary fade-in-seq seq-2">Login</a>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>

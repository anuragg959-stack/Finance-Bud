<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Bud | Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header class="top-nav">
    <a href="index.html" class="brand-link">
      <span class="mini-logo">🌱</span>
      <span>Finance Bud</span>
    </a>
    <nav class="nav-actions">
      <label class="theme-switch" title="Toggle light/dark mode">
        <input type="checkbox" id="nav-theme-toggle" />
        <span>Dark Mode</span>
      </label>
      <a href="profile.html" class="nav-link">Profile</a>
      <a href="index.html" class="nav-link">Logout</a>
    </nav>
  </header>

  <main class="dashboard-grid">
    <section class="card">
      <h2>Add Expense</h2>
      <form id="expense-form" class="expense-form">
        <label>
          Amount
          <input type="number" id="amount" min="0" step="0.01" required />
        </label>

        <label>
          Currency
          <select id="currency" required>
            <option value="INR">INR</option>
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
            <option value="GBP">GBP</option>
            <option value="JPY">JPY</option>
          </select>
        </label>

        <label>
          Category
          <select id="category" required>
            <option value="Food">Food</option>
            <option value="Travel">Travel</option>
            <option value="Bills">Bills</option>
            <option value="Shopping">Shopping</option>
            <option value="Health">Health</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Other">Other</option>
          </select>
        </label>

        <label>
          Date
          <input type="date" id="date" required />
        </label>

        <label>
          Notes
          <textarea id="notes" rows="3" placeholder="Short note..."></textarea>
        </label>

        <button type="submit" class="btn btn-primary">Add Expense</button>
      </form>
    </section>

    <section class="card">
      <div class="section-head">
        <h2>Expense History</h2>
        <label class="inline-filter">
          Filter
          <select id="category-filter">
            <option value="All">All</option>
            <option value="Food">Food</option>
            <option value="Travel">Travel</option>
            <option value="Bills">Bills</option>
            <option value="Shopping">Shopping</option>
            <option value="Health">Health</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Other">Other</option>
          </select>
        </label>
      </div>
      <div class="totals">
        <p><strong>Total (INR):</strong> <span id="total-inr">₹0.00</span></p>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Amount</th>
              <th>Category</th>
              <th>Date</th>
              <th>Notes</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="expense-list"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <h2>Analytics</h2>
      <div class="chart-grid">
        <div class="chart-card"><canvas id="pie-chart"></canvas></div>
        <div class="chart-card"><canvas id="bar-chart"></canvas></div>
        <div class="chart-card wide"><canvas id="line-chart"></canvas></div>
      </div>
    </section>
  </main>

  <aside class="assistant card" id="assistant-box">
    <div class="assistant-header">
      <h3>AI Finance Assistant 🤖</h3>
      <button id="refresh-tips" class="btn btn-secondary small" type="button">Analyze</button>
    </div>
    <div id="assistant-chat" class="assistant-chat"></div>
    <form id="assistant-form" class="assistant-input-row">
      <input id="assistant-input" type="text" placeholder="Ask about your expenses..." required />
      <button class="btn btn-primary small" type="submit">Send</button>
    </form>
  </aside>

  <script src="script.js"></script>
</body>
</html>
